# Default run configuration for a live Hyper-NF session.
# Every run is reconstructable from this file + the raw LSL recording + git SHA.

acquisition:
  fs: 7.81                 # NIRSport2 sampling rate (Hz)
  n_channels: 20
  subjects: ["sub-01", "sub-02"]
  # LSL stream names to resolve per subject (set to your device stream names).
  fnirs_streams:
    sub-01: "NIRStar_A"
    sub-02: "NIRStar_B"
  montage:
    target_regions: ["PFC", "rTPJ"]   # selected from ALE meta-analysis
    short_channels: true              # for physiological-noise regression

preprocessing:
  band: [0.01, 0.1]        # hemodynamic band (Hz)
  motion_correction: "tddr"
  short_distance_regression: true

ins:
  estimator: "wavelet_coherence"   # or "windowed_correlation"
  window_s: 30.0
  update_every_s: 1.0
  band: [0.01, 0.1]

feedback:
  smoothing: 0.3
  gain: 2.0
  baseline_window: 64
  # mode is set per-session at enrollment (real for 2/3 sessions, sham for 1/3)
  mode: "real"
  transport: "lsl"          # "lsl" or "websocket" (open decision, CLAUDE.md §7)

session:
  protocol: "training"      # see session/protocol.py
  max_session_minutes: 30   # hard safety cap

storage:
  bids_root: "data/bids"
  datalad: true
  postgres_dsn: "postgresql://localhost/mindx"   # metadata only, pseudonymized

dyad:
  dyad_id: "dyad-00"        # pseudonymized; never store PII
